name: 'Setup AI Hedge Fund'
description: 'Shared setup steps for all fund workflows'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  config-path:
    description: 'Path to config.yaml'
    required: false
    default: 'config.yaml'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Install package
      run: pip install -e ".[dev]"
      shell: bash

    - name: Validate config
      run: python -m ai_hedge_fund config --validate --config ${{ inputs.config-path }}
      shell: bash

    - name: Verify imports
      run: |
        python -c "from ai_hedge_fund import AHHedgeFund; print('AHHedgeFund OK')"
        python -c "from ai_hedge_fund.scoring.composite_engine import CompositeEngine; print('CompositeEngine OK')"
        python -c "from ai_hedge_fund.technical.iae_confluence import IAEConfluenceEngine; print('IAEConfluenceEngine OK')"
        python -c "from ai_hedge_fund.portfolio.sleeve_manager import SleeveManager; print('SleeveManager OK')"
        python -c "from ai_hedge_fund.risk.risk_manager import RiskManager; print('RiskManager OK')"
      shell: bash
