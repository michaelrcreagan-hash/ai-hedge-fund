name: Portfolio Rebalance

# 1st of month + every Friday, ~5 PM ET (21:00 UTC ≈ 17:00 EDT).
# Winter (EST) adjust hours +1.
on:
  schedule:
    - cron: "0 21 1 * *"
    - cron: "0 21 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run rebalance
        env:
          TIPRANKS_API_KEY: ${{ secrets.TIPRANKS_API_KEY }}
          LSEG_API_KEY: ${{ secrets.LSEG_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m ai_hedge_fund rebalance
