name: Monte Carlo Stress Test

# Every Sunday ~2 PM ET (18:00 UTC ≈ 14:00 EDT). Winter (EST) adjust hour +1.
on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monte-carlo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run monte-carlo
        env:
          TIPRANKS_API_KEY: ${{ secrets.TIPRANKS_API_KEY }}
          LSEG_API_KEY: ${{ secrets.LSEG_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m ai_hedge_fund monte-carlo
