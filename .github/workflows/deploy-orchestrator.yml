name: Deploy Orchestrator

# Meta workflow: status -> scan -> rebalance. Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"

permissions:
  contents: read

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: System status
        run: python -m ai_hedge_fund status
      - name: Daily scan
        env:
          TIPRANKS_API_KEY: ${{ secrets.TIPRANKS_API_KEY }}
          LSEG_API_KEY: ${{ secrets.LSEG_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m ai_hedge_fund scan
      - name: Rebalance
        env:
          TIPRANKS_API_KEY: ${{ secrets.TIPRANKS_API_KEY }}
          LSEG_API_KEY: ${{ secrets.LSEG_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m ai_hedge_fund rebalance
